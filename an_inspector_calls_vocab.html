(function(){

  function save(){ try { localStorage.setItem(KEY, JSON.stringify(progress)); } catch(e){} }

  function norm(x){ return (x||"").trim().toLowerCase().replace(/[.,!?;:'"]+$/g,""); }

  function pickGbVoice(){

    if (quiz.i >= quiz.questions.length){
      var total = quiz.questions.length, great = quiz.score===total;
      return card('<div style="text-align:center;padding:24px 10px"><div style="font-size:40px;margin-bottom:8px">'+(great?"\uD83C\uDFC6":"\uD83D\uDC4F")+'</div><h3 style="font-family:'+SERIF+';color:'+C.ink+';margin:0 0 6px;font-size:26px">'+quiz.score+' / '+total+' 정답</h3><p style="color:'+C.inkSoft+';margin:0 0 20px">'+(great?"완벽해요! 모두 통과했어요.":"맞힌 단어는 다음 단계로 올라갔어요. 못 맞힌 단어는 그대로 남아 있으니 다시 도전해요.")+'</p><button data-action="quizStart" data-arg="'+kind+'" style="'+pbtn(C.gold,C.ink,C.gold,true)+'">다시 풀기</button></div>');
    }
    var q = quiz.questions[quiz.i], answered = quiz.answered, accent = q.kind==="fill"?C.indigo:C.teal;
    var header = '<div style="display:flex;justify-content:space-between;font-size:13px;color:#8b95a3;margin-bottom:10px"><span>문제 '+(quiz.i+1)+' / '+quiz.questions.length+'</span><span style="color:'+C.gold+';font-weight:700">점수 '+quiz.score+'</span></div>';
    var badge = '<div style="display:flex;align-items:center;gap:8px;margin:0 0 12px"><span style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#fff;background:'+accent+';padding:3px 10px;border-radius:999px">'+(q.kind==="fill"?"주관식":"객관식")+'</span><span style="font-size:12px;color:'+C.inkSoft+'">'+(q.kind==="fill"?"맞히면 외웠어요 \u2713":"맞히면 주관식 단계로")+'</span></div>';
    var inner;
    if (q.kind === "mc"){
      var tag = q.type==="enToWord"?"이 뜻에 맞는 단어는?":"이 단어의 뜻은?";
      var ptext = q.type==="enToWord"?esc(q.word.en):esc(q.word.word);
      var opts = q.options.map(function(opt,oi){
        var isC = opt.id===q.word.id, isP = quiz.pickedId===opt.id;
        var bg=C.paper,bd=C.line,fg=C.ink,bbg=C.paperEdge,bfg=C.inkSoft;
        if (answered&&isC){ bg="#e8f1e6";bd="#5a8c54";fg="#2f5a2c";bbg="#5a8c54";bfg="#fff"; }
        else if (answered&&isP&&!isC){ bg="#f6e3df";bd=C.clay;fg="#8a3a28";bbg=C.clay;bfg="#fff"; }
        var mark = answered&&isC?"\u2713":(answered&&isP&&!isC?"\u2715":"");
        return '<button '+(answered?"disabled":"")+' data-action="mc" data-arg="'+opt.id+'" style="text-align:left;padding:12px 14px;border-radius:12px;border:1.5px solid '+bd+';background:'+bg+';color:'+fg+';cursor:'+(answered?"default":"pointer")+';font-size:16px;font-family:'+(q.type==="enToWord"?SERIF:SANS)+';display:flex;gap:12px;align-items:center"><span style="flex:0 0 auto;width:24px;height:24px;border-radius:7px;display:grid;place-items:center;font-family:'+SANS+';font-size:13px;font-weight:700;background:'+bbg+';color:'+bfg+'">'+(oi+1)+'</span><span style="flex:1">'+(q.type==="enToWord"?esc(opt.word):esc(opt.ko))+'</span><span>'+mark+'</span></button>';
      }).join("");
      inner = '<p style="font-size:12px;letter-spacing:1px;text-transform:uppercase;color:'+C.clay+';font-weight:700;margin:0 0 10px">'+tag+'</p><p style="font-family:'+(q.type==="enToWord"?SANS:SERIF)+';font-size:'+(q.type==="enToWord"?18:34)+'px;color:'+C.ink+';margin:0 0 22px;line-height:1.3">'+ptext+'</p><div style="display:grid;gap:10px">'+opts+'</div><p style="text-align:center;font-size:12px;color:#9aa3ad;margin:16px 0 0;line-height:1.7">키보드: '+kbd("1")+'–'+kbd("4")+' 답 고르기'+(answered?' · '+kbd("Enter")+' 다음':"")+'</p>';
    } else {
      var fb = answered ? (quiz.correct?'<p style="margin:12px 0 0;font-size:15px;color:#2f5a2c">정답이에요! \u2713</p>':'<p style="margin:12px 0 0;font-size:15px;color:#8a3a28">아쉬워요. 정답: <b>'+esc(q.answer)+'</b></p>') : "";
      var ib = answered ? (quiz.correct?"#5a8c54":C.clay) : C.line;
      inner = '<p style="font-size:12px;letter-spacing:1px;text-transform:uppercase;color:'+C.clay+';font-weight:700;margin:0 0 10px">빈칸에 알맞은 단어를 쓰세요</p><p style="font-size:13px;color:'+C.inkSoft+';margin:0 0 8px">뜻: <b style="color:'+C.ink+'">'+esc(q.word.ko)+'</b></p><p style="font-family:'+SERIF+';font-size:19px;color:'+C.ink+';margin:0 0 18px;line-height:1.6">'+esc(q.display)+'</p><input id="fillInput" type="text" '+(answered?"disabled":"")+' placeholder="여기에 영어 단어 입력" autocapitalize="off" autocorrect="off" spellcheck="false" style="width:100%;box-sizing:border-box;padding:13px 14px;font-size:18px;font-family:'+SERIF+';color:'+C.ink+';background:'+(answered?"#f1ede3":"#fff")+';border:1.5px solid '+ib+';border-radius:12px;outline:none">'+fb+'<p style="text-align:center;font-size:12px;color:#9aa3ad;margin:16px 0 0;line-height:1.7">키보드: '+kbd("Enter")+' '+(answered?"다음":"제출")+'</p>';
    }
    var footer = (answered || q.kind==="fill") ? '<div style="margin-top:18px;display:flex;justify-content:flex-end;gap:10px">'+((q.kind==="fill"&&!answered)?'<button data-action="submit" style="'+pbtn(C.indigo,"#fff",C.indigo)+'">제출</button>':"")+(answered?'<button data-action="next" style="'+pbtn(C.ink,C.paper,C.ink)+'">'+(quiz.i+1>=quiz.questions.length?"결과 보기":"다음 문제 →")+'</button>':"")+'</div>' : "";
    return header + card(badge + inner + footer);
  }

  function renderProgress(c, pct){
    var r=52, circ=2*Math.PI*r, off=circ*(1-pct/100);
    var allDone = c.mastered===WORDS.length;
    var rows = [[C.gold,"외웠어요 (둘 다 통과)",c.mastered],[C.teal,"객관식 통과",c.spelling],[C.clay,"학습 중",c.learning + c.ready],[C.gray,"새 단어",c.new]];
    var ring = '<svg width="140" height="140" viewBox="0 0 140 140" style="flex:0 0 auto"><circle cx="70" cy="70" r="'+r+'" fill="none" stroke="'+C.paperEdge+'" stroke-width="14"></circle><circle cx="70" cy="70" r="'+r+'" fill="none" stroke="'+C.gold+'" stroke-width="14" stroke-linecap="round" stroke-dasharray="'+circ+'" stroke-dashoffset="'+off+'" transform="rotate(-90 70 70)"></circle><text x="70" y="66" text-anchor="middle" font-family="'+SERIF+'" font-size="30" font-weight="700" fill="'+C.ink+'">'+pct+'%</text><text x="70" y="86" text-anchor="middle" font-family="'+SANS+'" font-size="11" fill="'+C.inkSoft+'">외운 정도</text></svg>';
    var rowHtml = rows.map(function(rw){ return '<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid '+C.paperEdge+'"><span style="width:12px;height:12px;border-radius:4px;background:'+rw[0]+';flex:0 0 auto"></span><span style="color:'+C.ink+';font-size:15px;flex:1">'+rw[1]+'</span><span style="font-family:'+SERIF+';font-size:20px;font-weight:700;color:'+C.ink+'">'+rw[2]+'</span></div>'; }).join("");
    var grids = [1,2,3].map(function(act){
      var list = WORDS.filter(function(w){ return w.act===act; });
      var dots = list.map(function(w){
        var st = progress[w.id];
        var b4 = st==="mastered" ? "mastered" : st==="spelling" ? "mc" : (st==="learning"||st==="ready") ? "learning" : "new";
        var label4 = b4==="mastered" ? "외웠어요" : b4==="mc" ? "객관식 통과" : b4==="learning" ? "학습 중" : "새 단어";
        var bg = b4==="mastered"?C.gold:b4==="mc"?C.tealSoft:b4==="learning"?C.claySoft:C.paperEdge;
        var bd = b4==="mastered"?C.gold:b4==="mc"?C.teal:b4==="learning"?C.clay:"#d8d1c0";
        return '<span title="'+esc(w.word)+' — '+label4+'" style="width:22px;height:22px;border-radius:6px;display:grid;place-items:center;background:'+bg+';border:1px solid '+bd+';color:'+(b4==="mastered"?C.ink:C.inkSoft)+';font-size:10px;font-weight:700">'+(b4==="mastered"?"\u2713":"")+'</span>';
      }).join("");
      return card('<div style="display:flex;justify-content:space-between;margin-bottom:12px"><span style="font-family:'+SERIF+';font-size:18px;color:'+C.ink+';font-weight:700">Act '+act+'</span><span style="font-size:13px;color:'+C.inkSoft+'">'+list.filter(function(w){return progress[w.id]==="mastered";}).length+' / '+list.length+' 외움</span></div><div style="display:flex;flex-wrap:wrap;gap:6px">'+dots+'</div>', "margin-bottom:12px");
    }).join("");
    var resetBlock = resetConfirm
      ? '<div style="display:flex;gap:8px;align-items:center"><span style="font-size:13px;color:#8b95a3">정말 초기화할까요?</span><button data-action="resetYes" style="'+pbtn(C.clay,"#fff",C.clay)+'">네</button><button data-action="resetNo" style="'+pbtn("transparent","#8b95a3","#384556")+'">취소</button></div>'
      : '<button data-action="resetAsk" style="'+pbtn("transparent","#8b95a3","#384556")+'">진도 초기화</button>';
    return (allDone?'<div style="text-align:center;padding:14px;margin-bottom:16px;border-radius:12px;background:linear-gradient(90deg,'+C.gold+','+C.goldSoft+');color:'+C.ink+';font-weight:700">\uD83C\uDF89 모든 단어를 마스터했어요! 정말 대단해요.</div>':"")
      + card('<div style="display:flex;gap:24px;align-items:center;flex-wrap:wrap;justify-content:center">'+ring+'<div style="flex:1 1 180px;min-width:180px">'+rowHtml+'</div></div>')
      + '<div style="margin-top:16px">'+grids+'</div>'
      + '<div style="display:flex;gap:10px;margin-top:4px;flex-wrap:wrap"><button data-action="goLearn" style="'+pbtn(C.gold,C.ink,C.gold)+'">학습 계속하기</button>'+resetBlock+'</div>';
  }

  // ---------- main render ----------
  var app = document.getElementById("app");
  function render(){
    var c = counts(), pct = Math.round(c.mastered / WORDS.length * 100);
    var body = mode==="list" ? renderList() : mode==="mcq" ? renderQuizTab("mc") : mode==="fillq" ? renderQuizTab("fill") : mode==="progress" ? renderProgress(c,pct) : renderStudy();
    var tabs = [["learn","학습"],["review","복습"],["mcq","객관식퀴즈"],["fillq","주관식퀴즈"],["progress","진도"],["list","리스트"]];
    var nav = tabs.map(function(t){
      var a = mode===t[0];
      var cnt = t[0]==="review" ? c.learning : t[0]==="mcq" ? c.ready : t[0]==="fillq" ? c.spelling : 0;
      var bcol = t[0]==="mcq" ? C.teal : t[0]==="fillq" ? C.indigo : C.clay;
      var badge = cnt>0 ? '<span style="margin-left:5px;font-size:11px;padding:1px 6px;border-radius:999px;background:'+(a?"#0003":bcol)+';color:'+(a?C.ink:"#fff")+'">'+cnt+'</span>' : "";
      return '<button data-action="tab" data-arg="'+t[0]+'" style="flex:1 1 auto;min-width:58px;padding:10px 8px;cursor:pointer;font-family:'+SANS+';font-size:13px;font-weight:600;border-radius:10px;border:1px solid '+(a?C.gold:"#384556")+';background:'+(a?C.gold:"transparent")+';color:'+(a?C.ink:C.paperOnDark)+'">'+t[1]+badge+'</button>';
    }).join("");
    app.innerHTML = '<div style="max-width:720px;margin:0 auto">'
      + '<header style="margin-bottom:18px"><div style="display:flex;align-items:baseline;gap:10px;flex-wrap:wrap"><span style="font-size:12px;letter-spacing:3px;text-transform:uppercase;color:'+C.gold+'">J. B. Priestley</span><span style="height:1px;flex:1;min-width:30px;background:#3a4658"></span></div><h1 style="font-family:'+SERIF+';font-weight:700;color:'+C.paper+';font-size:clamp(26px,6vw,38px);line-height:1.1;margin:6px 0 4px">An Inspector Calls</h1><p style="margin:6px 0 0;color:#9aa3ad;font-size:15px;font-family:'+SERIF+';font-style:italic;letter-spacing:.3px">An inquiry by <span style="color:'+C.gold+';font-style:normal;font-weight:600;letter-spacing:.5px">Yena</span></p></header>'
      + '<div style="margin-bottom:18px"><div style="display:flex;justify-content:space-between;font-size:12px;color:#8b95a3;margin-bottom:6px"><span>외운 단어 '+c.mastered+' / '+WORDS.length+'</span><span style="color:'+C.gold+';font-weight:700">'+pct+'%</span></div><div style="height:8px;border-radius:999px;background:#2c3848;overflow:hidden"><div style="height:100%;width:'+pct+'%;background:linear-gradient(90deg,'+C.gold+','+C.goldSoft+');transition:width .5s"></div></div></div>'
      + '<nav style="display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap">'+nav+'</nav>'
      + '<div id="body">'+body+'</div>'
      + '<footer style="margin-top:30px;padding-top:18px;border-top:1px solid #2c3848;text-align:center">'
      +   '<p style="margin:0;font-family:'+SERIF+';font-style:italic;font-size:15px;color:#aeb6c2;letter-spacing:.3px;line-height:1.5">&ldquo;We are members of one body.&rdquo;</p>'
      +   '<p style="margin:6px 0 0;font-family:'+SERIF+';font-style:italic;font-size:13px;color:#8b95a3">&mdash; Inspector Goole</p>'
      +   '<p style="margin:8px 0 0;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#6b7686">An Inspector Calls · <span style="color:'+C.gold+'">Yena</span></p>'
      + '</footer>'
      + '</div>';
    var fi = document.getElementById("fillInput");
    if (fi){ fi.value = fillInput; if (!(quiz && quiz.answered)){ fi.focus(); var v=fi.value; fi.value=""; fi.value=v; } }
  }

  // ---------- actions ----------
  function rate(action){
    var ws = studyWords(); if (ws.length===0) return;
    if (study.idx > ws.length-1) study.idx = Math.max(0, ws.length-1);
    var w = ws[study.idx], cur = progress[w.id];
    var ns = action==="learning" ? "learning" : (RANK[cur] >= RANK.ready ? cur : "ready");
    setStatus(w.id, ns);
    if (mode==="review"){ if (ns==="learning") study.idx = (study.idx+1 < ws.length ? study.idx+1 : 0); }
    else { study.idx = (study.idx+1 < ws.length ? study.idx+1 : study.idx); }
    study.step = 0; render();
  }
  function startQuiz(kind){
    var wantStatus = kind==="mc" ? "ready" : "spelling";
    var pool = WORDS.filter(function(w){ return progress[w.id]===wantStatus; });
    if (pool.length===0) return;
    var chosen = shuffle(pool).slice(0, Math.min(10, pool.length));
    var questions = chosen.map(function(w){
      if (kind==="fill"){
        var ex = w.ex[Math.floor(Math.random()*w.ex.length)];
        return { word:w, kind:"fill", answer:markedToken(ex), display:blankSentence(ex) };
      }
      var type = Math.random()<0.5 ? "enToWord" : "wordToKo";
      var distractors = shuffle(WORDS.filter(function(x){ return x.id!==w.id; })).slice(0,3);
      return { word:w, kind:"mc", type:type, options:shuffle([w].concat(distractors)) };
    });
    quiz = { tab:kind, questions:questions, i:0, answered:false, correct:null, pickedId:null, score:0 };
    fillInput = ""; render();
  }
  function answerMc(optId){ if (!quiz||quiz.answered) return; var q=quiz.questions[quiz.i]; var correct=optId===q.word.id; if (correct) setStatus(q.word.id,"spelling"); quiz.answered=true; quiz.correct=correct; quiz.pickedId=optId; quiz.score+=correct?1:0; render(); }
  function submitFill(){ if (!quiz||quiz.answered) return; var q=quiz.questions[quiz.i]; var correct = norm(fillInput)===norm(q.answer) || norm(fillInput)===norm(q.word.word); if (correct) setStatus(q.word.id,"mastered"); quiz.answered=true; quiz.correct=correct; quiz.score+=correct?1:0; render(); }
  function goNext(){ if (!quiz) return; quiz.i++; quiz.answered=false; quiz.correct=null; quiz.pickedId=null; fillInput=""; render(); }

  // ---------- events ----------
  document.addEventListener("input", function(e){ if (e.target && e.target.id==="fillInput"){ fillInput = e.target.value; } });

  document.addEventListener("click", function(e){
    var el = e.target.closest("[data-action]"); if (!el) return;
    var a = el.getAttribute("data-action"), arg = el.getAttribute("data-arg");
    if (a==="tab"){ mode=arg; study={idx:0,step:0}; quiz=null; fillInput=""; listRevealed={}; listAllOn=false; resetConfirm=false; render(); }
    else if (a==="reveal"){ study.step=parseInt(arg,10); render(); }
    else if (a==="rate"){ rate(arg); }
    else if (a==="nav"){ var ws=studyWords(); if (arg==="prev") study.idx=Math.max(0,study.idx-1); else study.idx=Math.min(ws.length-1,study.idx+1); study.step=0; render(); }
    else if (a==="listToggle"){ listRevealed[arg]=!listRevealed[arg]; render(); }
    else if (a==="listAll"){ if (arg==="show"){ WORDS.forEach(function(w){ listRevealed[w.id]=true; }); listAllOn=true; } else { listRevealed={}; listAllOn=false; } render(); }
    else if (a==="quizStart"){ startQuiz(arg); }
    else if (a==="mc"){ answerMc(parseInt(arg,10)); }
    else if (a==="submit"){ submitFill(); }
    else if (a==="next"){ goNext(); }
    else if (a==="goLearn"){ mode="learn"; study={idx:0,step:0}; render(); }
    else if (a==="speak"){ speak(arg); }
    else if (a==="resetAsk"){ resetConfirm=true; render(); }
    else if (a==="resetYes"){ WORDS.forEach(function(w){ progress[w.id]="new"; }); save(); resetConfirm=false; render(); }
    else if (a==="resetNo"){ resetConfirm=false; render(); }
  });

  document.addEventListener("keydown", function(e){
    var t = e.target, inInput = t && (t.tagName==="INPUT"||t.tagName==="TEXTAREA");
    if (inInput){ if (t.id==="fillInput" && e.key==="Enter"){ e.preventDefault(); if (quiz && quiz.answered) goNext(); else submitFill(); } return; }
    if (mode==="learn" || mode==="review"){
      var ws = studyWords(); if (ws.length===0) return;
      if (e.key==="ArrowRight"){ e.preventDefault(); study.idx=Math.min(ws.length-1,study.idx+1); study.step=0; render(); }
      else if (e.key==="ArrowLeft"){ e.preventDefault(); study.idx=Math.max(0,study.idx-1); study.step=0; render(); }
      else if (e.key===" "||e.key==="Spacebar"||e.key==="ArrowDown"){ e.preventDefault(); study.step=Math.min(2,study.step+1); render(); }
      else if (e.key==="ArrowUp"){ e.preventDefault(); study.step=Math.max(0,study.step-1); render(); }
      else if (e.key==="1"){ e.preventDefault(); rate("learning"); }
      else if (e.key==="2"){ e.preventDefault(); rate("positive"); }
      else if (e.key==="p"||e.key==="P"){ e.preventDefault(); var cw=currentStudyWord(); if (cw) speak(cw.word); }
    } else if (mode==="mcq" || mode==="fillq"){
      var kind = mode==="mcq" ? "mc" : "fill";
      var wantStatus = kind==="mc" ? "ready" : "spelling";
      var pool = WORDS.filter(function(w){ return progress[w.id]===wantStatus; });
      if (!quiz || quiz.tab!==kind){ if (e.key==="Enter"&&pool.length>0){ e.preventDefault(); startQuiz(kind); } return; }
      if (quiz.i>=quiz.questions.length){ if (e.key==="Enter"){ e.preventDefault(); startQuiz(kind); } return; }
      var q = quiz.questions[quiz.i];
      if (!quiz.answered){ if (q.kind==="mc"){ var n=parseInt(e.key,10); if (n>=1&&n<=q.options.length){ e.preventDefault(); answerMc(q.options[n-1].id); } } }
      else if (e.key==="Enter"||e.key==="ArrowRight"||e.key===" "||e.key==="Spacebar"){ e.preventDefault(); goNext(); }
    }
  });

  render();
})();

</script>
</body>
</html>
